# /etc/nginx/sites-available/movis.bevrim.com
#
# Producción. Layout esperado en disco:
#   /var/www/movis.bevrim.com/
#   ├── client/dist/         ← build estático de Vite (servido por nginx)
#   ├── server/              ← Express + Socket.io (process node corriendo en 127.0.0.1:3010)
#   └── .env                 ← variables para el server
#
# El backend escucha en 127.0.0.1:3010 (PORT=3010 en su .env), no expuesto al exterior.
# Levantarlo con pm2/systemd. Ejemplo pm2:
#   cd /var/www/movis.bevrim.com/server && pm2 start src/index.js --name movis-server
#
# Tras crear/editar este archivo:
#   sudo ln -sf /etc/nginx/sites-available/movis.bevrim.com /etc/nginx/sites-enabled/movis.bevrim.com
#   sudo nginx -t && sudo systemctl reload nginx

upstream movis_backend {
    server 127.0.0.1:3010;
    keepalive 32;
}

# Rate limit muy generoso para socket.io. Mantenerlo presente para frenar
# floods, pero suficientemente alto para no cortar polling/reconnects legítimos.
limit_req_zone $binary_remote_addr zone=movis_io:10m rate=100r/s;

server {
    listen 80;
    listen [::]:80;
    server_name movis.bevrim.com;

    root /var/www/movis.bevrim.com/client/dist;
    index index.html;

    access_log /var/log/nginx/movis_access.log;
    error_log  /var/log/nginx/movis_error.log warn;

    # Tamaños / timeouts razonables
    client_max_body_size 2m;
    keepalive_timeout 65;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # Cabeceras de seguridad básicas
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ───── REST API → backend ─────
    location /api/ {
        proxy_pass http://movis_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ───── Socket.IO (websocket + polling) → backend ─────
    location /socket.io/ {
        limit_req zone=movis_io burst=400 nodelay;

        proxy_pass http://movis_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets son long-lived; nada de buffering
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ───── Assets de Vite con hash → cache agresiva ─────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Favicon e iconos (cache larga, no obligatoria)
    location ~* \.(?:ico|svg|png|jpg|jpeg|gif|webp|avif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # ───── SPA fallback: index.html sin cache ─────
    location / {
        # index.html nunca debe cachearse para que los deploys se vean al instante
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a archivos sensibles si por error caen en webroot
    location ~ /\.(?!well-known).* { deny all; }
    location ~* /(\.env|package(-lock)?\.json|\.git) { deny all; }
}

# ─────────────────────────────────────────────────────────────────
# HTTPS (recomendado): ejecutar después
#   sudo certbot --nginx -d movis.bevrim.com
# Certbot añadirá automáticamente el bloque listen 443 ssl, los
# certificados de Let's Encrypt y la redirección 80 → 443.
# ─────────────────────────────────────────────────────────────────
